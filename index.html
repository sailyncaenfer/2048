<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>2048 with like mods or smth</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="app">
  <header class="title">
    <button class="settings-btn" id="settingsBtn" type="button" aria-label="Open mods and settings">
      <span class="gear">&#9881;</span> Mods &amp; Settings
    </button>
    <h1>2048 <span style="font-weight:400; font-size:0.55em; color:rgb(140,128,112);"></span></h1>
    <p>2048 with like mods and stuff idk</p>
  </header>

  <div class="board-column">
    <div class="hud">
      <div class="active-mods" id="activeModsRow"></div>
      <div class="scorebar">
        <div class="score-box"><div class="label">Best</div><div class="value" id="bestVal">0</div></div>
        <div class="score-box"><div class="label">Score</div><div class="value" id="scoreVal">0</div></div>
        <div class="score-box"><div class="label">Moves</div><div class="value" id="movesVal">0</div></div>
      </div>
    </div>
    <div class="board-wrap" id="boardWrap">
      <div class="board" id="cellGrid"></div>
      <div class="tiles-layer" id="tilesLayer"></div>
      <div class="overlay" id="overlay">
        <h2 id="overlayTitle">Game Over</h2>
        <p id="overlaySub">No more moves left on the board.</p>
        <div class="buttons">
          <button class="pill" id="overlayRestart">Try Again</button>
        </div>
      </div>
    </div>
    <div class="toolbar">
      <button class="pill" id="newGameBtn">New Game</button>
      <button class="pill secondary" id="resetModsBtn">Clear Mods</button>
    </div>
    <p class="hint">Move with <kbd>&#8593;</kbd><kbd>&#8595;</kbd><kbd>&#8592;</kbd><kbd>&#8594;</kbd> or <kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd>. swipe on touch devices.</p>
  </div>

  <div class="modal-overlay" id="modalOverlay">
    <div class="modal" role="dialog" aria-modal="true" aria-label="Mods and settings">
      <div class="modal-header">
        <h2>Mods &amp; Settings</h2>
        <button class="modal-close" id="modalClose" type="button" aria-label="Close">&times;</button>
      </div>
      <div class="modal-body">
        <section class="anim-section">
          <h3>Animation</h3>
          <!--<p class="sub">Choose whether moves slide and tiles pop in, or resolve instantly.</p>-->
          <div class="segmented" id="animSegment">
            <button class="seg-btn" data-val="on" type="button">Animated</button>
            <button class="seg-btn" data-val="off" type="button">Instant</button>
          </div>
        </section>
        <section class="mods-section">
          <h3>Mods</h3>
          <!--<p class="sub">Toggle any combination. Changing a mod starts a fresh game.</p>-->
          <div id="modList"></div>
          <div class="panel-footer" id="comboNote"></div>
        </section>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</div>
</body>
</html>
